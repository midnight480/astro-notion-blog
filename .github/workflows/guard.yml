name: Takumi Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: flatt-security/setup-takumi-guard-npm@v1
        with:
          bot-id: ${{ secrets.TAKUMI_GUARD_BOT_ID }}
      - run: npm install
